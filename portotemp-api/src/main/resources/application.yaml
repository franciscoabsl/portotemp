spring:
  profiles:
    active: dev
  application:
    name: portotemp-api

  datasource:
    url: jdbc:postgresql://localhost:5432/portotemp
    username: portotemp_user
    password: portotemp_senha_segura_2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: dev_secret_local_apenas_deve_ter_no_minimo_32_chars
  expiration: 2592000000

logging:
  level:
    org.springframework.security: WARN

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

---
spring:
  profiles:
    active: dev
  config:
    activate:
      on-profile: dev
