spring:
  application:
    name: portotemp-api

  datasource:
    url: jdbc:postgresql://localhost:5432/portotemp
    username: portotemp_user
    password: portotemp_senha_segura_2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: dev_secret_local_apenas
  expiration: 86400000
